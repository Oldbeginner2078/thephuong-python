<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Châu Anh - Happy Women's Day</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: auto;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            min-height: 100vh;
        }

        .image-container {
            width: 100%;
            max-width: 95vw;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            width: 100%;
            height: auto;
            max-width: 100%;
            display: block;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
            }
        }

        @media (min-width: 1025px) {
            .image-container {
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="2.png" alt="Châu Anh - Happy Women's Day" loading="lazy">
    </div>
</body>
</html>
