<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Viet Nam Women Days</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="letter.ico">
<style>
* {
    box-sizing: border-box;
}

body, html {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
}

body {
    min-height: 100vh;
    background-image: url("kali-tiles.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
}

#loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("bg-loading.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    color: #ffffff;
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 400;
    animation: fadeIn 0.5s forwards;
    padding: 20px;
    overflow: hidden;
}

#loading2 {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("bg-loading.jpg");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    color: #ffffff;
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 400;
    padding: 20px;
    overflow: hidden;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}
@keyframes fadeInOut {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
}

#loading.fade-out {
    animation: fadeOut 0.2s forwards;
}

.progress-bar {
    width: clamp(200px, 80vw, 500px);
    height: 20px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 20px;
}

.progress {
    width: 0%;
    height: 100%;
    background: #ffffff;
    transition: width 0.5s;
}

#progress-text {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(1rem, 4vw, 1.5rem);
    margin-top: 10px;
    color: #ffffff;
}

#ready-question {
    display: none;
    text-align: center;
    color: #ffffff;
    font-family: 'Times New Roman', cursive;
    font-size: clamp(1.5rem, 6vw, 3rem);
    margin-top: 20px;
}

#ready-button {
    display: none;
    margin-top: 20px;
    padding: clamp(8px, 2vw, 15px) clamp(15px, 4vw, 25px);
    font-size: clamp(1rem, 4vw, 1.5rem);
    font-family: 'Times New Roman', cursive;
    background-color: #ffffff;
    color: #333;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
}

#ready-button:hover { 
    background-color: #ddd; 
}

#name-form {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 100vh;
    background-image: url("bgm-hopthoai.png");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
    font-family: 'Pinyon Script', cursive;
    padding: 20px;
    overflow: auto;
}

#name-form h1 { 
    font-size: clamp(1.5rem, 8vw, 3rem);
    color: #880e4f;
    text-align: center;
    margin: 0 0 20px 0;
}

#name-form input {
    padding: 10px 15px;
    font-size: clamp(0.9rem, 4vw, 1.5rem);
    border: 2px solid #880e4f;
    border-radius: 5px;
    outline: none;
    margin-top: 20px;
    max-width: 300px;
    width: 90%;
    font-family: 'Pinyon Script', cursive;
}

#name-form button {
    margin-top: 20px;
    padding: clamp(8px, 2vw, 15px) clamp(15px, 4vw, 25px);
    font-size: clamp(0.9rem, 4vw, 1.5rem);
    background-color: #880e4f;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
    font-family: 'Pinyon Script', cursive;
}

#name-form button:hover { 
    background-color: #aa265f; 
}

/* Responsive adjustments for small screens */
@media (max-width: 480px) {
    #loading {
        justify-content: flex-start;
        padding-top: 40px;
    }
}
</style>
</head>
<body>
<div id="loading">
    <div id="loading-text">Loading...</div>
    <div class="progress-bar"><div class="progress"></div></div>
    <div id="progress-text">0%</div>
    <!-- dynamic message shown during wait after submit -->
    <div id="dynamic-wait" style="display:none;position:absolute;bottom:60px;font-size:clamp(0.9rem,4vw,1.2rem);color:#ffffff;font-family:'Times New Roman',cursive;text-align:center;width:90%;max-width:600px;">
        Đang tìm bức ảnh đẹp nhất của bạn...
    </div>
    <div id="ready-question">Cậu đã sẵn sàng chưa?</div>
    <button id="ready-button">Gét gô</button>
</div>
<div id="name-form">
    <h1>Xin hỏi ngày tháng năm sinh của bạn (ví dụ: 0311):</h1>
    <input type="text" id="nameInput" placeholder="0311">
    <button id="submitName">Xác nhận</button>
</div>

<!-- Block selection form for duplicates (e.g., two people with same DOB) -->
<div id="block-form" style="display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;min-height:100vh;background-image:url('bgm-hopthoai.png');background-size:cover;background-repeat:no-repeat;background-position:center;background-attachment:fixed;font-family:'Pinyon Script',cursive;padding:20px;overflow:auto;">
    <h1 style="font-size:clamp(1.5rem,8vw,3rem);color:#880e4f;text-align:center;margin:0 0 20px 0;">Bạn thi khối nào?</h1>
    <div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center;">
        <button id="block-A00" style="padding:clamp(10px,3vw,20px) clamp(20px,5vw,40px);font-size:clamp(1rem,4vw,1.5rem);background-color:#880e4f;color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:'Pinyon Script',cursive;">A00</button>
        <button id="block-A01" style="padding:clamp(10px,3vw,20px) clamp(20px,5vw,40px);font-size:clamp(1rem,4vw,1.5rem);background-color:#880e4f;color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:'Pinyon Script',cursive;">A01</button>
    </div>
</div>




<script>
// declare variables in outer scope so event handlers can access them
let progress = 0;
let progressBar;
let progressText;
let loadingText;
let loadingScreen;
let readyQuestion;
let readyButton;
let nameForm;
let dynamicWait;
let dynamicInterval;

window.onload = function() {
    progress = 0;
    progressBar = document.querySelector('.progress');
    progressText = document.getElementById('progress-text');
    loadingText = document.getElementById('loading-text');
    loadingScreen = document.getElementById('loading');
    dynamicWait = document.getElementById('dynamic-wait');
    readyQuestion = document.getElementById('ready-question');
    readyButton = document.getElementById('ready-button');
    nameForm = document.getElementById('name-form');

    const interval = setInterval(() => {
        progress += 1;
        progressBar.style.width = progress + '%';
        progressText.textContent = progress + '%';
        if (progress < 100) {
            loadingText.textContent = "Loading...";
        } else {
            clearInterval(interval);
            loadingText.textContent = "Done!";
            readyQuestion.style.display = 'block';
            readyButton.style.display = 'block';

            readyButton.addEventListener('click', () => {
                loadingScreen.classList.add('fade-out');
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    nameForm.style.display = 'flex';
                }, 500);
            });
        }
    }, 100);
}

// submit handler now has access to outer variables

function normalizeDob(s){
    return (s||'').toString().replace(/\D/g,'').replace(/^0+/,'');
}

async function handleSubmit() {
    const dobInput = document.getElementById('nameInput').value;
    if (dobInput.trim() === '') {
        alert('Vui lòng nhập ngày tháng năm sinh!');
        return;
    }

    // Fetch data from data.json
    let guestData;
    try {
        const response = await fetch('./data.json');
        guestData = await response.json();
    } catch (error) {
        alert('Không thể tải dữ liệu. Vui lòng thử lại.');
        console.error('Fetch error:', error);
        nameForm.style.display = 'flex';
        return;
    }

    const target = normalizeDob(dobInput);
    const matches = guestData.filter(item => normalizeDob(item.dob) === target);

    // hide the input form
    nameForm.style.display = 'none';

    // clone the original loading screen to keep it pristine
    const newLoading = loadingScreen.cloneNode(true);
    newLoading.id = 'loading2';
    newLoading.classList.remove('fade-out');
    newLoading.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;background-image:url("bg-loading.jpg");background-size:cover;background-repeat:no-repeat;background-position:center;background-attachment:fixed;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ffffff;font-family:"Pinyon Script",cursive;font-size:clamp(2rem,8vw,4rem);font-weight:400;padding:20px;overflow:hidden;';
    document.body.appendChild(newLoading);

    // grab elements inside clone
    const cloneProgressBar = newLoading.querySelector('.progress');
    const cloneProgressText = newLoading.querySelector('#progress-text');
    const cloneLoadingText = newLoading.querySelector('#loading-text');
    const cloneReadyQuestion = newLoading.querySelector('#ready-question');
    const cloneReadyButton = newLoading.querySelector('#ready-button');
    const cloneDynamic = newLoading.querySelector('#dynamic-wait');

    if(cloneLoadingText) cloneLoadingText.textContent = "Vui lòng chờ...";
    if (cloneReadyQuestion) cloneReadyQuestion.style.display = 'none';
    if (cloneReadyButton) cloneReadyButton.style.display = 'none';

    // show dynamic text toggling
    if(cloneDynamic) cloneDynamic.style.display = 'block';
    let toggle = true;
    const localDynamic = setInterval(() => {
        if(cloneDynamic) cloneDynamic.textContent = toggle ?
            "Đang viết nên lời chúc tốt đẹp nhất..." :
            "Đang tìm bức ảnh đẹp nhất của bạn...";
        toggle = !toggle;
    }, 4000);

    // reset progress
    let prog = 0;
    if(cloneProgressBar) cloneProgressBar.style.width = '0%';
    if(cloneProgressText) cloneProgressText.textContent = '0%';

    const localProgress = setInterval(() => {
        prog += 12.5;
        if (prog > 100) prog = 100;
        if(cloneProgressBar) cloneProgressBar.style.width = prog + '%';
        if(cloneProgressText) cloneProgressText.textContent = Math.floor(prog) + '%';
        if (prog >= 100) clearInterval(localProgress);
    }, 1000);

    setTimeout(() => {
        clearInterval(localDynamic);
        
        if (matches.length === 0) {
            alert('Không tìm thấy hồ sơ với ngày sinh đã nhập.');
            newLoading.remove();
            nameForm.style.display = 'flex';
        } else if (matches.length === 1) {
            // single match - redirect directly
            window.location.href = 'asset/' + matches[0].file;
        } else {
            // multiple matches - show block selection form
            newLoading.remove();
            const blockForm = document.getElementById('block-form');
            blockForm.style.display = 'flex';
            
            // store matches in window scope for button handlers
            window.matchedRecords = matches;
        }
    }, 8000);
}

document.getElementById('submitName').addEventListener('click', handleSubmit);

// Block selection handlers
document.getElementById('block-A00').addEventListener('click', () => {
    if (window.matchedRecords) {
        const blockForm = document.getElementById('block-form');
        const target = window.matchedRecords.find(r => r.block === 'A00');
        if (target) {
            blockForm.style.display = 'none';
            window.location.href = 'asset/' + target.file;
        } else {
            alert('Không tìm thấy hồ sơ cho khối A00.');
        }
    }
});

document.getElementById('block-A01').addEventListener('click', () => {
    if (window.matchedRecords) {
        const blockForm = document.getElementById('block-form');
        const target = window.matchedRecords.find(r => r.block === 'A01');
        if (target) {
            blockForm.style.display = 'none';
            window.location.href = 'asset/' + target.file;
        } else {
            alert('Không tìm thấy hồ sơ cho khối A01.');
        }
    }
});
</script>
</body>
</html>
